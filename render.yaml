services:
  # ─── Backend: Node.js API ───────────────────────────────────────────────────
  - type: web
    name: tkmaster-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: 5000
      - key: SENDGRID_API_KEY
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: ADMIN_EMAIL
        sync: false

  # ─── Frontend: React Static Site ────────────────────────────────────────────
  - type: web
    name: tkmaster-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://tkmaster-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
