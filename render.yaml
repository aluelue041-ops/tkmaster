services:
  # ─── Backend: Node.js API ───────────────────────────────────────────────────
  - type: web
    name: tkmaster-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: MONGO_URI
        value: mongodb+srv://ronohb70_db_user:Sniperfx738@ticketsz.9uqegl5.mongodb.net/?appName=ticketsz
      - key: JWT_SECRET
        value: supersecretjwtkey123
      - key: PORT
        value: 5000

  # ─── Frontend: React Static Site ────────────────────────────────────────────
  - type: web
    name: tkmaster-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://tkmaster-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
